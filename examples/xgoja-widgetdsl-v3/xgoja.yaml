schema: xgoja/v2
name: widgetdsl-v3-examples
app:
  name: widgetdsl-v3-examples
  envPrefix: WIDGETDSL_V3_EXAMPLES
go:
  module: github.com/go-go-golems/rag-evaluation-system/examples/xgoja-widgetdsl-v3/generated
  version: 1.26.4
workspace:
  mode: auto
providers:
  - id: go-go-goja-core
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/core
    register: Register
  - id: go-go-goja-host
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/host
    register: Register
  - id: go-go-goja-http
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/http
    register: Register
  - id: rag-widget-site
    import: github.com/go-go-golems/rag-evaluation-system/pkg/xgoja/providers/widgetsite
    register: Register
    module:
      replace: ../..
runtime:
  modules:
    - provider: go-go-goja-host
      name: fs
      as: fs:assets
      config:
        embedded:
          allow: true
          mounts:
            - asset: widget-spa
              mount: /app
            - asset: widget-v3-examples
              mount: /examples
    - provider: go-go-goja-http
      name: express
      as: express
    - provider: rag-widget-site
      name: widget.dsl
      as: widget.dsl
sources:
  - id: widget-v3-site
    kind: jsverbs
    from:
      dir: ./jsverbs
    include:
      - site.js
      - server.js
    language: javascript
  - id: widget-spa
    kind: assets
    from:
      dir: ../../packages/rag-evaluation-site/app-dist
  - id: widget-v3-examples
    kind: assets
    from:
      dir: ../../pkg/widgetdsl/testdata/v3/examples
commands:
  - id: verbs
    type: builtin.jsverbs
    name: verbs
    sources:
      - widget-v3-site
  - id: http-serve
    type: provider.command-set
    name: serve
    mount: serve
    provider: go-go-goja-http
    sources:
      - widget-v3-site
artifacts:
  - id: binary
    type: binary
    output: dist/widgetdsl-v3-examples
    sources:
      - widget-v3-site
  - id: declarations
    type: dts
    output: js/types/xgoja-modules.d.ts
    strict: true
  - id: embedded-assets
    type: embedded-assets
    sources:
      - widget-spa
      - widget-v3-examples
