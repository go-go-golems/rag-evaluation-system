schema: xgoja/v2
name: rag-widget-xgoja-site
app:
  name: rag-widget-xgoja-site
  envPrefix: RAG_WIDGET_SITE
go:
  module: xgoja.generated/rag-widget-xgoja-site
  version: "1.26"
workspace:
  mode: auto
providers:
  - id: go-go-goja-host
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/host
    register: Register
  - id: go-go-goja-http
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/http
    register: Register
  - id: rag-widget-site
    import: github.com/go-go-golems/rag-evaluation-system/pkg/xgoja/providers/widgetsite
    register: Register
    module:
      replace: ../../..
runtime:
  modules:
    - provider: go-go-goja-http
      name: express
      as: express
    - provider: go-go-goja-host
      name: fs
      as: fs:assets
      config:
        embedded:
          allow: true
          mounts:
            - asset: webapp
              mount: /app
    - provider: go-go-goja-host
      name: db
      as: db
      config:
        dataSourceName: ':memory:'
        driverName: sqlite3
    - provider: rag-widget-site
      name: widget.dsl
      as: widget.dsl
sources:
  - id: local-sites
    kind: jsverbs
    from:
      dir: ./verbs
    language: javascript
  - id: widget-dsl
    kind: help
    from:
      provider:
        provider: rag-widget-site
        source: widget-dsl
  - id: webapp
    kind: assets
    from:
      dir: ./assets
commands:
  - id: verbs
    type: builtin.jsverbs
    name: verbs
    sources: [local-sites]
  - id: http-serve
    type: provider.command-set
    name: serve
    mount: serve
    provider: go-go-goja-http
    sources: [local-sites]
artifacts:
  - id: binary
    type: binary
    output: dist/rag-widget-xgoja-site
    sources: [local-sites]
  - id: embedded-assets
    type: embedded-assets
    sources: [webapp]
