schemaVersion: widget-manifest/v1
type: FormDialog
module: widget.dsl
helper: formDialog
props: FormDialogWidgetProps
adapter:
  path: ./FormDialog.widget.tsx
  export: formDialogWidget
reactComponent: FormDialog
children: false
slots:
